<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USACE VR Mobile Site</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    
    <!-- Custom CSS (load after Bootstrap) -->
    <link rel="stylesheet" href="../Stylesheets/Styles.css">
</head>
<body>

    <header>
    </header>

    <div class="container-fluid"> 
        <div class="row">
            <!-- Left Empty Column -->
            <div class="col-1">
                <!-- Empty space -->
            </div>
            
            <!-- Main Content Column -->
            <div class="col-10">
                <div class="content mt-5">
                    <div class="table-container">

                        <table id="dataTable" class="table table-striped table-bordered" >
                            <thead>
                                <tr>
                                    <th>Arkansas</th>
                                    <th>Georgia</th>
                                    <th>Missouri</th>
                                    <th>Ohio</th>
                                    <th>West Virginia</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td> 
                                        <p class="my-auto p-0" data-bs-toggle="modal" data-bs-target="#BeaverLake" >Beaver Lake</p>
                                        <p class="my-auto p-0">Lake Ouachita</p>
                                    </td>
                                    <td>
                                        <p class="my-auto p-0">Carters Lake</p>
                                        <p class="my-auto p-0">Allatoona Lake</p>
                                    </td>
                                    <td>
                                        <p class="my-auto p-0">Table Rock Lake</p>
                                    </td>
                                    <td>
                                        <p class="my-auto p-0">Beech Fork Lake</p>
                                    </td>
                                    <td>
                                        <p class="my-auto p-0">Alum Creek</p>
                                    </td>
                                </tr>
                            </tbody>

                            <!--Table Footer-->
                            <tfoot>
                                <tr>
                                    <th colspan="5" class="table-footer">
                                        <div class="footer-content">
                                            <div class="footer-left">
                                                <span class="toggle-label">View: VR</span>
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" type="checkbox" id="toggleView">
                                                    <label class="form-check-label" for="toggleView">
                                                        360
                                                    </label>
                                                </div>
                                            </div>
                                            <div class="crop">
                                                <img src="../images/usace-logo.jpg" alt="USACE Logo" width="100" >
                                            </div>
                                        </div>
                                     </th>
                                </tr>
                            </tfoot>

                        </table>

                    </div>
                </div>
            </div>


            <!-- Modal Test Run || BEAVER LAKE -->
            <div class="modal fade" id="BeaverLake" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ...
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Understood</button>
                    </div>
                    </div>
                </div>
            </div>



            
            <!-- Right Empty Column -->
            <div class="col-1">
                <!-- Empty space -->
            </div>
        </div>
    </div>







    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- Custom DataTable Initialization -->
    <script src="../js/datatable-init.js"></script>

</body>
</html>
