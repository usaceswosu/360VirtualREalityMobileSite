 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USACE VR Mobile Site</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    
    <!-- Custom CSS (load after Bootstrap) -->
    <link rel="stylesheet" href="../Stylesheets/Styles.css">

</head>
<body>

    <div class="container-fluid"> 
        <div class="row">
            <!-- Left Empty Column -->
            <div class="col-1">
                <!-- Empty space for filler/border -->
            </div>
            
            <!-- Main Content Column -->
            <div class="col-10">
                <div class="content mt-5">
                    <div class="table-container">
                        <table id="dataTable" class="table table-striped table-bordered">
                            <thead>
                                <tr>
                                    <th>Arkansas</th>
                                    <th>Georgia</th>
                                    <th>Missouri</th>
                                    <th>Ohio</th>
                                    <th>West Virginia</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <p><a href="#">Beaver Lake</a></p>
                                        <p><a href="#">Lake Ouachita</a></p>
                                    </td>
                                    <td>
                                        <p><a href="#">Allatoona Lake</a></p>
                                        <p><a href="#">Carters Lake</a></p>
                                    </td>
                                    <td><p><a href="#">Table Rock Lake</a></p></td>
                                    <td><p><a href="#">Beech Fork Lake</a></p></td>
                                    <td><p><a href="#">Alum Creek</a></p></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                    <th colspan="5" class="table-footer">
                                        <div class="footer-content">
                                            <div class="footer-left">
                                                <span class="toggle-label">View: 360</span>
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" type="checkbox" id="toggleView">
                                                    <label class="form-check-label" for="toggleView">
                                                        VR
                                                    </label>
                                                </div>
                                            </div>
                                            <div class="crop">
                                                <img src="../images/usace-logo.jpg" alt="USACE Logo" width="100" >
                                            </div>
                                        </div>
                                     </th>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Right Empty Column -->
            <div class="col-1">
                <!-- Empty space -->
            </div>
        </div>
    </div>

    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- Custom DataTable Initialization -->
    <script src="../js/datatable-init.js"></script>
    
    <!-- Modal Handler Script -->
    <script src="../js/modal-handler.js"></script>

    <!-- Lake Details Modal -->
    <div class="modal fade" id="lakeModal" tabindex="-1" aria-labelledby="lakeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="lakeModalLabel">Lake Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-6">
                                <img id="lakeImage" src="" alt="Lake Image" class="img-fluid rounded mb-3 lake-modal-image">
                            </div>
                            <div class="col-md-6">
                                <h6><strong>State:</strong> <span id="lakeState"></span></h6>
                                <h6><strong>Location:</strong> <span id="lakeLocation"></span></h6>
                                <p><strong>Description:</strong></p>
                                <p id="lakeDescription"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // Lake Modal Handler Script
$(document).ready(function() {
    // Handle lake link clicks
    $('.lake-link').on('click', function(e) {
        e.preventDefault(); // Prevent default link behavior
        
        // Get data from the clicked link
        const lakeName = $(this).data('lake');
        const lakeState = $(this).data('state');
        const lakeLocation = $(this).data('location');
        const lakeDescription = $(this).data('description');
        const lakeImage = $(this).data('image');
        
        // Populate modal with data
        $('#lakeModalLabel').text(lakeName);
        $('#lakeState').text(lakeState);
        $('#lakeLocation').text(lakeLocation);
        $('#lakeDescription').text(lakeDescription);

        
        // Handle image - use placeholder if no image provided
        if (lakeImage && lakeImage !== '') {
            $('#lakeImage').attr('src', lakeImage);
        } else {
            $('#lakeImage').attr('src', 'https://via.placeholder.com/400x300/6a8b6e/ffffff?text=' + encodeURIComponent(lakeName));
        }
        $('#lakeImage').attr('alt', lakeName);
        
        // Show the modal
        $('#lakeModal').modal('show');
    });
    
    // Add smooth animation when modal opens
    $('#lakeModal').on('show.bs.modal', function () {
        $(this).find('.modal-dialog').css({
            'transform': 'scale(0.8)',
            'opacity': '0'
        });
    });
    
    $('#lakeModal').on('shown.bs.modal', function () {
        $(this).find('.modal-dialog').animate({
            'transform': 'scale(1)',
            'opacity': '1'
        }, 200);
    });
});

</script>

</body>
</html>
