    <header>
        <img src="images/USACELogo.png" alt="Website Logo">
    </header>

    <div class="container">
        <div class="sidebar">
            <ul>
                <li><a href="Homepage.html">Home</a></li>

            </ul>

        <div class="content">
            <div class="video-container">
                <div class="video-player">
                <iframe class="video" id="mainVideo" src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
                    </div>

                <div class="video-tabs">
                    <button onclick="changeVideo('https://www.youtube.com/embed/e5UOtzRybzU')">Lake</button>
                    <button onclick="changeVideo('https://www.youtube.com/embed/4NnM9Bu-BU0')">Boat</button>
                    <button onclick="changeVideo('https://www.youtube.com/embed/Gt97WoWfzmo')">Forest</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeVideo(videoUrl) {
            video=document.getElementById('mainVideo')
            // Add fade-out class
            video.classList.add('fade-out-video');

            // Wait for fade-out transition
            setTimeout(() => {
                // Change source
                video.src = videoUrl;

                // Remove fade-out, add fade-in
                
            setTimeout(() => {    
                video.classList.remove('fade-out-video');
                video.classList.add('fade-in-video');
            
                // Remove fade-in after transition
                setTimeout(() => {
                    video.classList.remove('fade-in-video');
                }, 500);
            }, 500);
            }, 750);
        }
    </script>

</body>
